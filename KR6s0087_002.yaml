body:
  text: 釋靜泰撰重翻本是一經或有二重翻者乃至六重翻者合三百二十八部一千一百一十六卷大乘經重翻二百三部五百二十四卷放光般若波羅蜜經三十卷或二十卷四百六十紙晉元康元年無羅叉共竺叔蘭於陳留譯光讚般若波羅蜜經十卷或十五卷二百一十五紙晉太康年竺法護譯右二經同本異譯道行般若波羅蜜經十卷一百六十五紙後漢元和年支謙譯新道行經十卷一名新小品經或七卷一百五十四紙晉太始年竺法護譯小品般若經十卷或八卷一百五十四紙後秦弘始年羅什譯明度經四卷一名大明度無極經或六卷九十一紙右四經同本異譯悲華經十卷一百九十四紙北涼沮渠蒙遜世曇無讖於姑臧譯大悲分陀利經八卷一百六十五紙右二經同本異譯念佛三昧經六卷或五卷九十二紙宋大明年功德直於楊州譯大方等大集菩薩念佛三昧經十卷一百三十二紙隋大業年達磨笈多於東京上林園譯皇朝奏行右二經同本異譯大方廣十輪經八卷或七卷一百一十紙大乘大集地藏十輪經十卷一百七十一紙唐永徽年玄奘譯右二經同本異譯妙法蓮華經七卷或八卷一百四十八紙後秦弘始年羅什譯正法華經十卷一百八十九紙晉太康年竺法護譯妙法蓮華經七卷大隋仁壽元年三藏崛多譯右三經同本異譯楞伽阿跋多羅經四卷九十二紙宋元嘉年求那跋陀羅譯入楞伽經十卷一百七十五紙後魏世菩提留支譯右二經同本異譯菩薩行方便境界神通變化經三卷四十七紙大薩遮尼乾子經七卷或八卷一百三十一紙後魏世菩提留支譯右二經同本異譯大般泥洹經六卷是大般涅槃經前分十卷盡大眾問品一百四十紙晉義熙年沙門法顯譯右一經是大般涅槃經別品殊譯大哀經八卷是初陀羅尼自在王菩薩品或七卷一百一十九紙晉元康年竺法護譯虛空藏所問經八卷是虛空藏菩薩品或六卷一百八紙西秦乞伏仁世聖堅譯菩薩淨行經二卷是寶髻菩薩品一名寶髻菩薩經四十八紙晉永熙年竺法護譯無盡意經六卷或四卷亦是阿差末經八十六紙晉太始年竺法護譯阿差末經七卷是無盡意品或四卷九十二紙晉永嘉年竺法護譯無言童子經二卷是無言品四十一紙晉世竺法護譯寶女經三卷是寶女品或四卷六十三紙晉太康年竺法護譯右七經是大集經別品殊譯大樹緊那羅王所問經四卷六十五紙後秦弘始年羅什譯伅真陀羅所問經二卷或三卷五十七紙建寧年支謙譯右二經同本異譯持人菩薩所問經四卷五十二紙晉世竺法護譯持世經四卷亦名法印經七十五紙後秦弘始年羅什譯右二經同本異譯弘道廣顯三昧經四卷五十三紙晉永嘉年竺法護譯阿耨達龍王經二卷一名阿耨請佛或三卷五十二紙晉世竺法護譯右二經同本異譯普超三昧經三卷六十七紙晉太康年竺法護譯阿闍世王經二卷五十四紙後漢世支謙譯右二經同本異譯等集眾德三昧經三卷或二卷四十九紙晉世竺法護譯集一切福德三昧經三卷四十八紙右二經同本異譯聖善住意天子所問經三卷五十五紙後魏世留支波若譯如幻三昧經二卷或三卷五十六紙晉世竺法護譯大方等善住意天子所問經四卷六十八紙隋大業年達摩笈多於東京上林園譯皇朝奏行右三經同本異譯廣博嚴淨不退轉輪經四卷或六卷七十八紙宋元嘉年智嚴共寶雲譯不退轉法輪經四卷七十一紙阿惟越致遮經二卷或四卷六十一紙晉太康年竺法護譯右三經同本異譯思益梵天問經四卷八十二紙後秦弘始年羅什譯持心梵天所問經四卷一名等御諸法一名莊嚴佛法或六卷九十四紙晉太康年竺法護譯勝思惟梵天所問經六卷一百一紙後魏世菩提留支譯右三經同本異譯漸備一切智德經五卷一百五紙是華嚴經十地品晉元康年竺法護別譯十住經四卷亦是十地品九十七紙後秦弘始年羅什別譯羅摩伽經三卷入法界品七十七紙西秦乞伏仁世聖堅譯信力入印法門經五卷是華嚴經別品九十五紙後魏世菩提留支別譯如來興顯經四卷一名興顯如幻經是如來性起品六十七紙晉元康年竺法護別譯度世經六卷是離世間品一百一十九紙晉元康年竺法護別譯菩薩十住經一卷是十住品五紙菩薩本業經一卷是淨行品并十住品略無偈十三紙吳黃武年支謙別譯諸菩薩求佛本業經一卷是淨行品十一紙右九經是華嚴經別品殊譯佛昇忉利天為母說法經二卷或三卷三十六紙晉太康年竺法護譯道神足無極變化經四卷或二卷五十一紙晉太康年安法欽譯右二經同本異譯深密解脫經五卷七十二紙後魏世留支譯解深密經五卷七十三紙唐貞觀年玄奘譯右二經同本異譯維摩詰經二卷五十二紙吳黃武年支謙譯維摩詰所說經三卷六十一紙後秦弘始年羅什譯說無垢稱經六卷九十一紙唐貞觀年玄奘譯右三經同本異譯諸法無行經二卷三十一紙後秦弘始年羅什譯諸法本無經三卷三十八紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行右二經同本異譯無極寶三昧經一卷三十紙晉永嘉年竺法護譯寶如來三昧經二卷三十紙右二經同本異譯方等泥洹經二卷四十五紙晉世佛陀跋陀羅共法顯譯哀泣經二卷三十紙四童子經三卷三十三紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行右三經同本異譯惠上菩薩問大善權經二卷三十紙晉太康年竺法護譯大乘方便經三卷或二卷四十一紙晉世竺難提譯右二經同本異譯文殊師利現寶藏經三卷三十二紙晉太始年竺法護譯大方廣寶篋經三卷三十一紙右二經同本異譯奮迅王問經二卷四十二紙後魏世留支譯自在王經二卷三十四紙後秦弘始年羅什譯右二經同本異譯大淨法門經一卷二十四紙晉世竺法護譯大莊嚴法門經二卷二十六紙隋開皇年耶舍譯右二經同本異譯順權方便經二卷一名轉女身菩薩經或一卷二十七紙晉世竺法護譯樂瓔珞莊嚴方便經一卷二十五紙宋世法海譯右二經同本異譯大雲請雨經一卷二十二紙後周世崛多譯大雲輪轉請雨經二卷或一卷二十六紙隋開皇年耶舍譯大方等大雲請雨經一卷十九紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行右三經同本異譯度諸佛境界智嚴經一卷八紙梁天監年曼陀羅共僧伽婆羅於楊州譯如來莊嚴智慧光明入諸佛境界經二卷或一卷三十四紙後魏世菩提留支譯度諸佛境界智光嚴經一卷十七紙右三經同本異譯月光童子經一卷更有一卷同名而卷小不足八紙晉世竺法護譯申日經一卷八紙德護長者經二卷二十六紙隋開皇年耶舍譯右三經同本異譯大方等頂王經一卷一名維摩詰子問經二十紙大乘頂王經一卷十六紙善思童子經二卷二十紙隋開皇年崛多譯右三經同本異譯郁伽長者所問經一卷二十四紙魏世康僧鎧譯郁迦羅越問菩薩行經一卷二十五紙晉世竺法護譯法鏡經二卷二十二紙後漢世安玄共佛調譯右三經同本異譯無量清淨平等覺經二卷六十紙魏世白延譯阿彌陀經三卷五十三紙吳黃武年支謙譯無量壽經二卷三十九紙晉永嘉年竺法護譯稱讚淨土佛攝受經一卷十紙唐永徽年玄奘譯右四經同本異譯觀虛空藏菩薩經一卷二紙宋元嘉年曇摩蜜多於楊州譯虛空藏菩薩經一卷二十七紙虛空藏菩薩神呪經一卷十七紙後秦世佛陀耶舍譯虛空孕菩薩經二卷三十一紙隋開皇崛多譯右四經同本異譯緣生經二卷二十二紙隋大業年達摩笈多於東京上林園譯分別緣起經二卷二十二紙唐永徽年玄奘譯右二經同本異譯彌勒成佛經一卷十七紙晉世竺法護譯彌勒下生經一卷一名彌勒授決經六紙後秦弘始年羅什譯彌勒來時經一卷三紙闕本訪得右三經同本異譯不空羂索經一卷十紙隋開皇年崛多譯不空羂索神呪經一卷十二紙唐貞觀年玄奘譯右二經同本異譯小無量壽經一卷四紙宋元嘉年求那跋陀羅譯無量壽佛經一卷五紙後秦弘始年羅什譯右二經同本異譯藥師琉璃光經一卷十三紙藥師如來本願經一卷十三紙隋大業年達摩笈多於東京上林園譯皇朝奏行藥師琉璃光如來本願功德經一卷十二紙唐世玄奘譯右三經同本異譯老母經一卷亦名老女人經二紙吳世支謙譯老母六英經一卷二紙右二經同本異譯文殊師利巡行經一卷五紙後魏世留支菩提譯文殊尸利行經一卷七紙隋開皇年崛多譯右二經同本異譯金剛上味陀羅尼經一卷十四紙後魏世佛陀扇多譯金剛場陀羅尼經一卷十四紙隋開皇年崛多譯右二經同本異譯正恭敬經一卷五紙後魏世佛陀扇多譯善恭敬經一卷七紙隋開皇年崛多譯右二經同本異譯離垢施女經一卷二十四紙晉太康年竺法護譯無垢施菩薩分別應辯經一卷二十二紙晉世竺法護譯得無垢女經一卷二十五紙闕本訪得後魏興和年瞿曇留支於相州譯右三經同本異譯無畏德女經一卷二十五紙後魏元象年佛陀扇多譯阿闍世王女阿術達菩薩經一卷十七紙晉世竺法護譯右二經同本異譯無涯際持法門經一卷十五紙西秦世法堅譯尊勝菩薩入無量門陀羅尼經一卷十七紙齊世萬天懿相州譯右二經同本異譯第一義法勝經一卷十四紙後魏興和年留支譯大威燈光仙人問疑經一卷十四紙隋開皇年崛多譯右二經同本異譯八吉祥經一卷二紙宋世元嘉年求那跋陀羅於荊州譯八佛名號經一卷三紙隋開皇年崛多譯右二經同本異譯龍施女經一卷二紙晉世竺法護譯龍施菩薩本起經一卷四紙右二經同本異譯睒子經一卷五紙西秦世法堅譯菩薩睒子經一卷五紙右二經同本異譯了本生死經一卷四紙吳黃武年支謙譯稻芉經一卷六紙右二經同本異譯大方廣菩薩十地經一卷七紙晉世竺法護譯莊嚴菩提心經一卷七紙後秦弘始年羅什譯右二經同本異譯無所希望經一卷一名象王經十九紙晉世竺法護譯象腋經一卷十五紙右二經同本異譯大方等修多羅王經一卷二紙後魏世留支譯轉有經一卷二紙右二經同本異譯大乘方等要慧經一卷一紙彌勒菩薩所問經一卷四紙後魏世留支譯慧印三昧經一卷二十一紙吳世支謙譯如來智印經一卷十九紙右四經同本異譯一切法高王經一卷二十紙後魏興和年留支譯諸法勇王經一卷十七紙右二經同本異譯決定總持經一卷八紙一名決總持晉竺法護譯謗佛經一卷七紙後魏世留支譯右二經同本異譯乳光佛經一卷六紙晉世竺法護譯犢子經一卷二紙右二經同本異譯佛遺日摩尼寶經一卷十五紙後漢光和年支讖譯大寶積經一卷二十一紙摩訶衍寶嚴經一卷二十紙右三經同本異譯金剛般若經一卷舍衛國十二紙後秦弘始年羅什譯金剛般若波羅蜜經一卷婆伽婆十四紙後魏世菩提留支譯金剛般若經一卷祇樹林十四紙陳世真諦譯能斷金剛般若經一卷十九紙唐世玄奘譯右四經同本異譯長者子制經一卷一名制經六紙逝童子經一卷二紙晉世支法度譯菩薩逝經一卷一名逝經四紙右三經同本異譯文殊師利問菩提經一卷亦名菩提無行經七紙後秦弘始年羅什譯伽耶山頂經一卷十紙後魏世菩提留支譯象頭精舍經一卷九紙隋開皇年毘尼多留支譯右三經同本異譯貝多樹下思惟十二因緣經一卷四紙晉世竺法護譯聞城十二因緣經一卷四紙後漢世安世高譯十二因緣經一卷四紙南齊永明年求那地毘譯右三經同本異譯轉女身經一卷十九紙腹中女經一卷三紙南齊世法化誦出腹藏經一卷三紙無垢