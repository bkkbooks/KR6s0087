body:
  text: 釋靜泰撰單本源來一本更無別翻合四百四十一部二千七百八十三卷大乘經單本一百九十一部一千二百六十二卷大方廣佛華嚴經六十卷一千八十七紙晉義熙年佛陀跋陀羅共法業等於楊州譯成五十卷大般涅槃經四十卷七百二十紙北涼沮渠世曇無讖共慧嵩等於姑臧譯大般若波羅蜜多經六百卷一萬二千紙唐世玄奘於玉華譯摩訶般若波羅蜜經四十卷或三十卷六百十九紙後秦鳩摩羅什共僧睿等於長安逍遙園譯一名大品大方等大集經三十卷六百四紙北涼曇無讖於姑臧譯大方等日藏經十卷或十五卷二百四紙隋開皇年耶舍於大興善寺譯大方等月藏經十卷二百一十四紙齊世耶舍共法智譯寶星陀羅尼經十卷一百三十紙唐貞觀年波頗蜜多等於勝光寺譯大威德陀羅尼經二十卷二百六十五紙隋開皇年闍那崛多及笈多等於興善寺譯皇朝奏行法炬陀羅尼經二十卷三百紙隋大業年達摩笈多於東京上林園譯皇朝奏行大菩薩藏經二十卷四百一十紙貞觀年玄奘於弘福寺譯菩薩瓔珞經十二卷三百三紙或十四卷前秦建元年竺佛念於長安譯菩薩見實三昧經一十四卷二百三十八紙齊世耶舍譯佛名經一十二卷二百四十七紙後魏世菩提留支於相州譯月燈三昧經十卷或十一卷二百三紙齊天統年耶舍共法智譯賢劫經一十三卷一百九十五紙晉元康年竺法護譯華手經十卷二百一十五紙後秦弘始年鳩摩羅什於長安大寺譯十住斷結經十卷二百五十四紙前秦建元年竺佛念共道安譯大灌頂經十二卷一百一十三紙晉世帛尸梨蜜多羅譯觀佛三昧經十卷或八卷一百五十九紙宋永初年佛跋陀羅於楊州譯五千五百佛名經八卷一百二十六紙隋開皇年闍那崛多及笈多等於興善寺譯皇朝奏行大方便報恩經七卷一百二十四紙大方等大集經八卷一百二十八紙勝天王般若波羅蜜經七卷一百二十一紙陳世月支國王子婆首那於楊州譯寶雲經七卷一百紙或七卷八卷梁曼陀羅楊州譯金光明經六卷或七卷八卷一百二十二紙北涼世曇無讖譯後三卷陳時真諦譯法集經八卷或七卷六卷一百二十一紙後魏世菩提留支於洛陽譯菩薩處胎經五卷一百一十三紙前秦世竺佛念於長安譯大悲經五卷八十八紙齊天統年耶舍共法智於相州譯大集賢護菩薩經五卷或六卷九十三紙隋開皇年闍那崛多及笈多於大興善寺譯皇朝奏行大方等無相經六卷一名大雲經九十二紙前秦竺佛念於長安譯密迹金剛力士經五卷或四卷一百一十二紙晉太康年竺法護譯大方等陀羅尼經四卷或五卷六十二紙北涼世法衆於高昌郡譯海龍王經四卷七十二紙北涼世曇無讖譯央掘魔羅經四卷七十八紙宋元嘉年求那跋陀羅於楊州譯無所有菩薩經四卷六十紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行僧伽吒經四卷五十一紙後魏世月支婆首那譯觀察諸法經四卷六十紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行七佛神呪經四卷七十紙菩薩本行經三卷五十二紙稱楊諸佛功德經三卷五十五紙後秦弘始年羅什譯菩薩藏經三卷六十一紙後秦弘始年羅什譯力莊嚴三昧經三卷三十六紙隋開皇年耶舍譯須真天子經三卷或四卷四十六紙晉太始年竺法護譯首楞嚴三昧經三卷或二卷五十二紙後秦弘始年羅什譯般舟三昧經三卷或二卷四十七紙晉世竺法護譯等目菩薩所問三昧經二卷或三卷五十紙晉世竺法護譯明度五十挍計經二卷四十紙後漢世安世高譯菩薩瓔珞本業經二卷四十八紙前秦世竺佛念譯護國菩薩經二卷四十三紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行超日明三昧經二卷四十六紙晉太始年竺法護譯月上女經二卷二十七紙隋開皇年崛多譯中陰經二卷二十七紙前秦世竺佛念於長安譯須彌藏經二卷三十八紙齊世耶舍共法智譯佛花嚴入如來不思議境界經一卷二十八紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行大法鼓經二卷四十紙宋世求那跋摩於楊州譯諸佛要集經二卷四十二紙晉世竺法護譯文殊師利佛土嚴淨經二卷三十四紙晉永熙年竺法護於洛陽譯濡首菩薩無上清淨分衛經二卷一名決了諸法如幻三昧經宋世翔公於南海郡譯大乘同性經二卷三十九紙後周天和年闍那崛多共僧安譯大集譬喻王經二卷三十二紙隋開皇年闍那崛多共僧安及笈多等於大興善寺譯皇朝奏行阿閦佛國經二卷一名佛剎菩薩學成經三十八紙後漢建和年支讖於洛陽譯蓮華面經二卷二十二紙隋開皇年耶舍譯迦葉經二卷三十九紙後魏世月婆首那譯孔雀王陀羅尼經二卷四十二紙梁世僧伽婆羅譯發覺淨心經二卷二十七紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行無上依經二卷三十一紙陳世沙門真諦於廣州譯移識經二卷三十三紙隋開皇闍那崛多及笈多等於大興善寺譯皇朝奏行未曾有因緣經二卷四十紙南齊世曇景譯大方廣如來性經二卷或三卷五十一紙不思議功德經二卷一名功德經三十八紙大吉義呪經二卷或四卷三十八紙菩薩夢經二卷一名瑞應經三十四紙寂照三摩地經一卷一十三紙唐世玄奘譯文殊師利問經二卷四十九紙仁王般若經二卷二十八紙法界體性無分別經二卷二十四紙密迹金剛力士經二卷三十六紙大方廣如來祕密藏經二卷二十四紙善臂菩薩所問經二卷二十六紙東方最勝燈王如來經一卷十二紙隋開皇年闍那崛多等於大興善寺譯諸法最上王經一卷二十二紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行成具光明定意經一卷二十二紙後漢靈帝世支曜譯太子須大拏經一卷十六紙西秦世法堅譯太子慕魄經一卷五紙晉世竺法護譯須賴經一卷十九紙吳黃武年支謙譯金色王經一卷八紙後魏世留支譯獨證自誓三昧經一卷一名如來自誓三昧經八紙晉世竺法護譯摩訶摩耶經三卷二十五紙南齊世曇景譯大方等如來藏經一卷九紙晉義熙年佛陀跋陀羅譯如來方便善巧呪經一卷十一紙隋開皇年崛多譯勝鬘師子吼一乘大方便經一卷十九紙宋元嘉年求那陀羅於楊州譯須摩提菩薩經一卷一名須摩提經八紙晉世竺法護譯希有挍量功德經一卷六紙隋開皇年崛多譯梵女首意經一卷五紙晉世竺法護譯差摩婆帝授記經一卷四紙後魏世留支譯月明菩薩經一卷三紙吳黃武年支謙譯滅十方冥經一卷六紙晉元熙年竺法護譯出生菩薩心經一卷十一紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行普門品經一卷十二紙晉太康年竺法護譯菩薩十住經一卷十四紙晉世竺法護譯商主天子經一卷十六紙隋開皇年闍那崛多及笈多等於大興善寺譯皇朝奏行心明經一卷三紙晉世竺法護譯月燈三昧經一卷一名文殊師利菩薩十事行一名建慧三昧經十紙宋世先公譯不思議光菩薩所説經一卷一名不思議光咳童菩薩經十二紙晉世竺法護譯文殊師利問菩薩署經一卷一名問署經二十紙後漢靈帝世支讖譯德光太子經一卷一名賴吒問光德太子經一十九紙晉太始年竺法護譯施燈功德經一卷十四紙齊世耶舍譯菩薩訶色欲經一卷二紙後秦弘始年羅什譯人本欲生經一卷十四紙後漢桓帝世安世高譯人所從來經一卷失本晉世竺法護譯不增不減經一卷六紙後魏世留支譯佛語經一卷三紙後魏世留支譯無字寶篋經一卷六紙後魏世留支譯如來師子吼經一卷五紙後魏世菩提留支共佛陀扇多譯十法經一卷二十紙梁普通年僧伽婆羅於楊州譯不必定入印經一卷二十一紙後魏世留支譯十二佛名神呪經一卷六紙隋開皇年崛多譯魔逆經一卷十八紙晉太康年竺法護譯濟諸方等學經一卷十四紙晉世竺法護譯菩薩行五十緣身經一卷六紙晉世竺法護譯內藏百寶經一卷八紙後漢靈帝世支謙譯大方廣總持經一卷十三紙隋開皇年毗尼多留支譯彌勒菩薩所問本願經一卷八紙晉世竺法護譯文殊師利説般若波羅蜜經一卷二十二紙梁天監年曼陀羅譯堅固女經一卷六紙隋開皇年耶舍譯演道俗業經一卷九紙西秦世法堅譯菩薩生地經一卷一名差摩竭經三紙吳黃武年支謙譯菩薩道樹經一卷一名私呵昧經一名道樹三昧經十一紙吳黃武年支謙譯寶網經一卷一名寶網童子經二十三紙晉世竺法護譯百佛名經一卷六紙隋開皇年耶舍譯無量義經一卷十七紙南齊建元年曇無伽陀耶舍楊州譯觀彌勒上生兜率天經一卷八紙北涼世沮渠安陽侯譯觀無量壽經一卷十六紙宋元嘉年疆良耶舍於楊州譯觀普賢菩薩行法經一卷十六紙宋元嘉年曇無蜜多於楊州譯觀藥王藥上二菩薩經一卷十九紙宋元嘉年疆良耶舍譯請觀世音消伏毒害陀羅尼經一卷十一紙宋世外國般主竺難提譯觀世音菩薩授記經一卷十四紙宋世曇無竭於楊州譯鹿母經一卷四紙晉世竺法護譯鹿子經一卷三紙吳建興年支謙譯除恐災患經一卷十五紙魏世白延譯溫室洗浴衆僧經一卷三紙晉世竺法護譯四不可得經一卷四紙晉世竺法護譯諸德福田經一卷一名福田經六紙晉世法炬譯出家功德經一卷五紙吳世支謙譯入法界體性經一卷十紙隋開皇年闍那崛多於大興善寺譯皇朝奏行虛空藏菩薩問持幾福經一卷六紙菩薩修行經一卷一名威勢長者觀身行經七紙菩薩投身餓虎起塔因緣經一卷七紙一切施主所行檀波羅蜜經一卷四紙頻婆娑羅王詣佛供養經一卷五紙薩羅國經一卷四紙大意經一卷五紙天王太子辟羅經一卷三紙長者音悅經一卷五紙長者法志妻經一卷三紙一切智光明仙人慈心因緣不食肉經一卷五紙文殊師利般涅槃經一卷四紙師子月佛本生經一卷七紙阿彌陀鼓音聲陀羅尼經一卷四紙法華三昧經一卷十一紙金剛三昧本性清淨不壞不滅經一卷一名金剛清淨經八紙寶積三昧文殊師利問法身經一卷六紙千佛因緣經一卷十八紙八部佛名經一卷二紙八吉祥神呪經一卷十紙八陽經一卷三紙甚希有經一卷五紙最無比經一卷二紙諸佛心陀羅尼一卷二紙受持七佛名號經一卷佛臨涅槃記法住經一卷五紙佛地經一卷十紙稱讚大乘功德經一卷五紙顯無邊佛土功德經一卷二紙勝幢臂印陀羅尼一卷三紙拔濟苦難陀羅尼一卷二紙八音普密陀羅尼經一卷二紙持世陀羅尼經一卷七紙緣起聖道經一卷五紙十二緣起經一卷二紙六門陀羅尼經一卷二紙般若多心經一卷一紙天請問經一卷三紙右一十七卷並是唐玄奘譯十吉祥經一卷三紙賢首經一卷一名賢首夫人經三紙甚深大回向經一卷五紙賢者五福德經一卷二紙幻士仁賢經一卷一十八紙八大人覺經一卷二紙闕本訪得後出阿彌陀佛偈一卷闕本訪得大乘律單本一十九部三十五卷優婆塞戒經七卷是在家菩薩戒或五卷八十二紙北涼世曇無讖惠嵩等譯佛藏經四卷七十八紙後秦弘始年羅什於長安譯大方廣三戒經三卷四十四紙寶梁經二卷三十紙北涼世道龔譯梵網經二卷三十九紙後秦世羅什譯菩薩藏經一卷九紙梁天監年僧伽婆羅於楊州譯決定毗尼經一卷十九紙衆録皆云於燉煌譯竟不顯世代人名文殊師利悔過經一卷一名文殊五體悔過經二十一紙晉世竺法護譯舍利弗悔過經一卷一名悔過經五紙晉世竺法護譯法律三昧經一卷七紙菩薩內戒經一卷十七紙三曼陀颰陀羅菩薩經一卷六紙菩薩受齋經一卷二紙淨