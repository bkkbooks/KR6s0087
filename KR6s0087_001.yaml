共惠遠於廬山譯俱舍論本一卷唐世玄奘譯十八部論一卷七紙陳世真諦譯明了論一卷陳世真諦譯隨相論二卷三十四紙陳世真諦譯此二卷入藏目貞觀九年四月奉敕苑內寫一切經大總持寺僧智通共使人祕書郎遂良等附新譯經挍定申奏奉敕施行有人將大集三十卷日藏十卷月藏十卷無盡意六卷明度挍計二卷五部合為六十卷大集者誤也勘文大集前十方諸佛會日藏月藏後十方諸菩薩會無盡意是重譯明度挍計是別部又撿仁壽二年翻經大德彥琮法師等奉敕新定一切經目五部各自別行貞觀十一年四月皇太子於延興寺造一切經有人將六十卷大集本來諸德莫之能定遂抄入藏仍五本重抄目復不改智通覩此參差處處尋勘乃見八卷金光明序云開皇十七年興善寺沙門寶貴昔晉朝支敏度合兩竺二支一百五本首楞嚴為一部八卷又合一支兩竺三本維摩為一部五卷斯既先哲遺蹤遂承規合此大集為六十卷今讀經文集會時別梵甲亦各不同翻譯時代又異流傳遍及海外今忽合之恐疑惑者多所引楞嚴淨名注經等只是私記並不入藏六十卷大集豈得獨行幸冀來哲詳而體焉
