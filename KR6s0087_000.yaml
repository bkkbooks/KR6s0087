front:
  text: 大唐東京大敬愛寺一切經論目序釋靜泰撰夫文字即解脫真場摽不二之宗名句稱波若玄扄開唯一之路是以法籍馳簡詔百億而同文至教驅轍環大千而共軌玉箱花題炳發天城金牒寶詞昭彰龍宇自悲雲西起慈液東飛肇漸昭於周星終大明於漢日蘭騰鬱乎首唱竺什欣然嗣武於是三乘警轡八藏張門懸二耀之高暉亘兩儀之長久曩屬當塗龍駭典午鳧驚函谷風䨪道鏡如隱金淩水鬪性珠俄逸遂有論參經語疏涉論名乘紊大小教齊凡聖亦有黃巾之醜混莊釋為同源素褐之首格儒佛為派緒叨天侮聖肆虐胸襟顏子摽光淨之談尼父榜儒童之稱進退惟谷首尾陷機竊負神器偷安智識波旬妄說邪辨亂真疑僞之興實由於此庸庸之輩握魚目而𫀽驪珠皎皎之流揚濁涇而分清渭開士所以扼腕高僧以之長息者也晉道安創裁目録齊法上亦為條例非無小異張置大同莫不以單譯居第一重翻處第二梵集配第三別生安第四疑僞充第五位雖列五繕寫唯三良以別生與本部不殊疑僞固非留限芟夷蕪穢洗拂塵瑕坦矣法疇差無稂莠我皇馭曆道應天飛廓五梵而論都奄四州而作后披十善以陶化憑五衍而貞風廣樹仁祠大隆教義顯慶年際西明寺成御造藏經更令隱鍊區格盡爾無所間然律師道宣又為録序殷因夏禮無革前修於三例外附申雜藏即法苑法集高僧僧史之流是也頗以毗贊有功故載之云爾皇太子列耀紫微承扉閶闔銑華雲蔚瑤躬嶽峙內精七淨外暢九言挹梓圖恭佩瑜端孝爰崇淨域薦祉二皇元良三寶永貞四衆龍朔三年正月二十二日敕令於敬愛道場寫一切經典又奉麟德元年正月二十六日敕取履味沙門十人惠概明玉神察道英曇邃等並選翹楚尤間文義參覆量挍首末三年又置官寮是塗供給敕使洛州長史銀青光祿大夫南康郡開國公韓威判官洛州司功參軍李亮臺使鄭州司士參軍盧行訥判官王屋縣尉鄭祖均等精加撿覆寫舊經論七百四十一部二千七百三十一卷又寫大唐三藏法師新譯經論七十五部一千三百三十五卷合新舊八百一十六部四千六十六卷入藏其有古來有目而無本者合三百八十二部七百二十五卷隨訪隨寫真所謂偉哉法寶內外無瑕洞矣法流晈鏡深淺純一無雜具足清白而已哉並毫疏寒兔紙落秋蒲題華碧字軸貞香木所冀天衣銷石不墜斯文地墨窮界微言尚在紹隆之福囑纍之功伏惟皇帝繼天理物乘虬制㝢河砂衍壽海滴覃基中宮葛菌固本摎木垂芳㬢魄清襟虹電流感儲君儀風象室烜日春居道契吟銅睟溫玉裕宸柯帝萼藩國維城內宷外寮肅朝清野霄形荷法橋之濟永隔邪津履識承惠炬之輝長遵正術靜泰不惟鄙昧輒撰斯文敢事加損還循舊轍三章久布畫一承風明誠古人請祛雜藏恐文溺質用除濫觴合成五卷次之於左衆經目録都合二千二百一十九部六千九百九十四卷單本源來一本更無別翻合四百四十一部二千七百八十三卷右第一卷重翻本是一經或有二重翻者乃至六重翻者合三百二十四部一千一百一十六卷賢聖集傳賢聖所撰翻譯有源合五十部一百八十六卷二千七百八十九紙右第二卷已前二卷三分合八百一十九部四千八十六卷入藏見録六百八十九部二千五百三十二卷仁壽二年勘定三十一部一百五十八卷貞觀九年奉行二十部二十一卷貞觀九年於闕本內訪得入藏翻得六十部六百七十卷貞觀已來玄奘見所翻顯慶四年西明寺奉敕寫經具録入目施一十五部六百六十四卷顯慶已來玄奘法師後所譯得龍朔三年敬愛寺奉敕寫經具録入藏別生於大部內抄出別行合八百一十部一千二百八十八卷右第三卷疑僞名雖似正義涉人造合二百八部四百九十六卷右第四卷已前二卷二分合一千一十八部一千七百八十三卷不須鈔寫闕本舊録有目而無經本合三百八十二部七百二十五卷請訪右第五卷
